<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
    <h1>Pomodoro Timer</h1>
    <button id="setting-button">Setting</button>
</header>

<main>
    <div id="sessions-control">
        <button id="pomodoro-button">Pomodoro</button>
        <button id="short-break-button">Short Break</button>
        <button id="long-break-button">Long Break</button>
    </div>

    <time id="timer-display">50:00</time>

    <div id="pomodoro-control">
        <button id="start-button">Start</button>
        <button id="pause-button">Pause</button>
        <button id="reset-button">Reset</button>
    </div>
</main>

<div id="settings-modal" class="hidden">
    <div id="modal-content">
        <h2>Settings</h2>

        <div class="settings-group">
            <label>Pomodoro (minutes): <input type="number" id="pomodoro-input" min="1" max="999" value="50"></label>
            <label>Short Break: <input type="number" id="short-break-input" min="1" max="999" value="5"></label>
            <label>Long Break: <input type="number" id="long-break-input" min="1" max="999" value="15"></label>

            <div class="settings-group">
                <label>Alarm Volume: <input type="range" id="alarm-volume-input" min="0" max="1" step="0.1" value="0.5"></label>
            </div>

            <div class="settings-group">
                <p>Theme Color: </p>
                <div id="theme-color">
                    <div class="color-circle active-color" data-color="#ffb38a" style="background: #ffb38a"></div>
                    <div class="color-circle" data-color="#ff8a8a" style="background: #ff8a8a"></div>
                    <div class="color-circle" data-color="#ff5a5a" style="background: #ff5a5a"></div>
                    <div class="color-circle" data-color="#ff0000" style="background: #ff0000"></div>
                </div>
            </div>
        </div>
        <button id="save-settings">Save & Close</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
